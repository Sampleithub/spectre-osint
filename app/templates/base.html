<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spectre OSINT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        spectre: {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            200: '#c7d2fe',
                            300: '#a5b4fc',
                            400: '#818cf8',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            800: '#3730a3',
                            900: '#312e81',
                            950: '#1e1b4b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        .typing-indicator::after { content: '...'; animation: dots 1.5s steps(4, end) infinite; }
        @keyframes dots { 0%, 20% { content: ''; } 40% { content: '.'; } 60% { content: '..'; } 80%, 100% { content: '...'; } }
        .prose-custom h1 { color: #a5b4fc; font-size: 1.5rem; font-weight: 700; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .prose-custom h2 { color: #c7d2fe; font-size: 1.25rem; font-weight: 600; margin-top: 1.25rem; margin-bottom: 0.5rem; border-bottom: 1px solid #1e293b; padding-bottom: 0.25rem; }
        .prose-custom h3 { color: #e0e7ff; font-size: 1.1rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; }
        .prose-custom p { margin-bottom: 0.5rem; line-height: 1.6; }
        .prose-custom ul, .prose-custom ol { margin: 0.5rem 0; padding-left: 1.5rem; }
        .prose-custom li { margin-bottom: 0.25rem; }
        .prose-custom strong { color: #f1f5f9; }
        .prose-custom code { background: #0f172a; padding: 0.125rem 0.375rem; border-radius: 0.25rem; font-size: 0.875rem; }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 font-mono min-h-screen">
    <nav class="border-b border-gray-800 bg-gray-900/80 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
            <a href="/" class="text-lg font-bold tracking-tight">
                <span class="text-spectre-400">//</span>
                <span class="text-white">SPECTRE</span>
                <span class="text-spectre-500">_OSINT</span>
            </a>
            <div class="text-xs text-gray-500">deep intelligence · human-in-the-loop</div>
        </div>
    </nav>
    <main class="max-w-6xl mx-auto px-4 py-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
